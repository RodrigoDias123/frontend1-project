<!DOCTYPE html>
<html lang="pt" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0d1117" />
  <title>Criar Conta — Dev Tasks</title>

  <!-- Redirect if already authenticated -->
  <script>
    (function() {
      var s = null;
      try { s = JSON.parse(localStorage.getItem('devtasks_user')); } catch(e) {}
      if (s) window.location.replace(s.organizationId ? 'app-enterprise.html' : 'app.html');
    })();
  </script>

  <link rel="icon" href="favicon.ico" type="image/x-icon" />

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    crossorigin="anonymous"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />
  <link rel="stylesheet" href="src/css/landing.css" />
</head>
<body class="auth-page">

  <div class="auth-wrapper">
    <div class="auth-card">

      <!-- Back link -->
      <a href="/" class="auth-back" aria-label="Voltar à página inicial">
        <i class="bi bi-arrow-left"></i>
      </a>

      <!-- Mode toggle -->
      <div class="login-mode-toggle mb-4">
        <button type="button" class="login-mode-btn login-mode-btn--active" id="btn-mode-solo" aria-pressed="true">
          <i class="bi bi-person-fill me-1"></i>Pessoal
        </button>
        <button type="button" class="login-mode-btn" id="btn-mode-enterprise" aria-pressed="false"
          onclick="window.location.href='register-empresa.html'">
          <i class="bi bi-building-fill me-1"></i>Empresarial
        </button>
      </div>

      <!-- Header -->
      <div class="text-center mb-4">
        <a href="/" class="landing-brand mb-3 d-inline-flex">
          <i class="bi bi-kanban-fill"></i>
          <span>Dev Tasks</span>
        </a>
        <h1 class="auth-title">Criar uma conta</h1>
        <p class="text-muted small">Preencha os campos para se registar.</p>
      </div>

      <!-- Alert -->
      <div id="auth-error" class="alert alert-danger small py-2 d-none" role="alert"></div>

      <!-- Form -->
      <form id="register-form" novalidate>

        <div class="mb-3">
          <label for="reg-name" class="form-label">Nome</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
            <input
              type="text"
              class="form-control"
              id="reg-name"
              placeholder="O seu nome"
              required
              minlength="2"
              autocomplete="name"
            />
          </div>
        </div>

        <div class="mb-3">
          <label for="reg-email" class="form-label">Email</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope-fill"></i></span>
            <input
              type="email"
              class="form-control"
              id="reg-email"
              placeholder="nome@exemplo.com"
              required
              autocomplete="email"
            />
          </div>
        </div>

        <div class="mb-3">
          <label for="reg-password" class="form-label">Palavra-passe</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input
              type="password"
              class="form-control"
              id="reg-password"
              placeholder="Mínimo 6 caracteres"
              required
              minlength="6"
              autocomplete="new-password"
            />
          </div>
        </div>

        <div class="mb-3">
          <label for="reg-confirm" class="form-label">Confirmar palavra-passe</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-shield-lock-fill"></i></span>
            <input
              type="password"
              class="form-control"
              id="reg-confirm"
              placeholder="Repita a palavra-passe"
              required
              minlength="6"
              autocomplete="new-password"
            />
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 mt-2" id="btn-register">
          <i class="bi bi-person-plus-fill me-2"></i>Criar Conta
        </button>

      </form>

      <div class="text-center mt-4">
        <p class="text-muted small mb-0">
          Já tem conta?
          <a href="login.html" class="auth-link">Entrar</a>
        </p>

      </div>

    </div>
  </div>

  <script src="src/js/auth.js" type="module"></script>
</body>
</html>
