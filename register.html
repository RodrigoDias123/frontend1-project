<!DOCTYPE html>
<html lang="pt" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrar</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="src/css/landing.css">
</head>
<body class="auth-page">
  <main class="auth-wrapper">
    <div class="auth-card">
      <a href="index.html" class="auth-back">
        <i class="bi bi-arrow-left"></i>
        Voltar para início
      </a>

      <h1 class="auth-title">Criar Conta</h1>
      <p class="text-muted small mb-4">Regista-te para começar a usar a aplicação.</p>

      <form id="register-form" class="d-grid gap-3">
        <div>
          <label for="register-name" class="form-label">Nome</label>
          <input type="text" id="register-name" name="name" class="form-control" required autocomplete="name">
        </div>
        <div>
          <label for="register-email" class="form-label">Email</label>
          <input type="email" id="register-email" name="email" class="form-control" required autocomplete="email">
        </div>
        <div>
          <label for="register-password" class="form-label">Senha</label>
          <input type="password" id="register-password" name="password" class="form-control" required autocomplete="new-password" minlength="6">
        </div>

        <button type="submit" id="btn-register" class="btn btn-success w-100">Criar conta</button>

        <div id="register-error" class="alert alert-danger py-2 small mb-0" style="display:none;" role="alert"></div>
      </form>

      <p class="text-center mt-4 mb-0 small text-muted">
        Já tem conta?
        <a href="login.html" class="auth-link">Entrar</a>
      </p>
    </div>
  </main>

  <script type="module">
    import { registerUser } from './src/js/api.js';

    const SESSION_KEY = 'devtasks_user';

    const form = document.getElementById('register-form');
    const errorDiv = document.getElementById('register-error');
    const submitBtn = document.getElementById('btn-register');

    function showError(message) {
      errorDiv.textContent = message;
      errorDiv.style.display = 'block';
    }

    function hideError() {
      errorDiv.style.display = 'none';
      errorDiv.textContent = '';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const name = document.getElementById('register-name').value.trim();
      const email = document.getElementById('register-email').value.trim();
      const password = document.getElementById('register-password').value;

      if (!name || !email || !password) {
        showError('Preencha todos os campos.');
        return;
      }

      if (password.length < 6) {
        showError('A senha deve ter pelo menos 6 caracteres.');
        return;
      }

      submitBtn.disabled = true;

      try {
        await registerUser({
          name,
          email,
          password,
          role: 'user',
          plan: 'free',
          organizationId: null,
        });

        localStorage.removeItem(SESSION_KEY);
        window.location.href = 'login.html';
      } catch (err) {
        if (err?.code === 'email_exists' || err?.message === 'email_exists') {
          showError('Já existe uma conta com este email.');
        } else if (String(err?.message || '').includes('Failed to fetch')) {
          showError('Sem ligação à MockAPI. Abre o projeto por servidor local (ex: http://localhost:8000) e tenta novamente.');
        } else {
          showError(`Erro ao criar conta: ${err?.message ?? 'tente novamente'}.`);
        }
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
