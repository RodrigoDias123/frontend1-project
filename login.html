<!DOCTYPE html>
<html lang="pt" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="src/css/landing.css">
</head>
<body class="auth-page">
  <main class="auth-wrapper">
    <div class="auth-card">
      <a href="index.html" class="auth-back">
        <i class="bi bi-arrow-left"></i>
        Voltar para início
      </a>

      <h1 class="auth-title">Entrar</h1>
      <p class="text-muted small mb-4">Acede à tua conta para continuar.</p>

      <form id="login-form" class="d-grid gap-3">
        <div>
          <label for="login-email" class="form-label">Email</label>
          <input type="email" id="login-email" name="email" class="form-control" required autocomplete="email">
        </div>
        <div>
          <label for="login-password" class="form-label">Senha</label>
          <input type="password" id="login-password" name="password" class="form-control" required autocomplete="current-password">
        </div>

        <button type="submit" id="btn-login" class="btn btn-primary w-100">Entrar</button>

        <div id="login-error" class="alert alert-danger py-2 small mb-0" style="display:none;" role="alert"></div>
      </form>

      <p class="text-center mt-4 mb-0 small text-muted">
        Não tem conta?
        <a href="register.html" class="auth-link">Registar</a>
      </p>
    </div>
  </main>

  <div id="mode-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;align-items:center;justify-content:center;padding:16px;">
    <div class="auth-card" style="width:min(420px,100%);padding:20px;">
      <h3 class="auth-title" style="font-size:1.25rem;margin-bottom:10px;">Escolhe o modo</h3>
      <p id="mode-help" class="text-muted small mb-3">Seleciona como queres entrar.</p>
      <div class="d-flex gap-2 flex-wrap">
        <button type="button" id="btn-mode-personal" class="btn btn-primary flex-grow-1">Pessoal</button>
        <button type="button" id="btn-mode-enterprise" class="btn btn-success flex-grow-1">Enterprise</button>
      </div>
      <button type="button" id="btn-mode-cancel" class="btn btn-outline-secondary w-100 mt-2">Cancelar</button>
    </div>
  </div>

  <script type="module">
    import { loginUser } from './src/js/api.js';

    const SESSION_KEY = 'devtasks_user';

    const form = document.getElementById('login-form');
    const errorDiv = document.getElementById('login-error');
    const submitBtn = document.getElementById('btn-login');
    const modeModal = document.getElementById('mode-modal');
    const modeHelp = document.getElementById('mode-help');
    const btnModePersonal = document.getElementById('btn-mode-personal');
    const btnModeEnterprise = document.getElementById('btn-mode-enterprise');
    const btnModeCancel = document.getElementById('btn-mode-cancel');
    let pendingUser = null;

    function readSession() {
      try {
        return JSON.parse(localStorage.getItem(SESSION_KEY) ?? 'null');
      } catch {
        return null;
      }
    }

    function showError(message) {
      errorDiv.textContent = message;
      errorDiv.style.display = 'block';
    }

    function hideError() {
      errorDiv.style.display = 'none';
      errorDiv.textContent = '';
    }

    function redirectBySession(session, mode = null) {
      if (mode === 'enterprise') {
        window.location.href = 'app-enterprise.html';
        return;
      }
      if (mode === 'personal') {
        window.location.href = 'app.html';
        return;
      }
      window.location.href = session?.organizationId ? 'app-enterprise.html' : 'app.html';
    }

    function openModeSelection(user) {
      pendingUser = user;
      btnModeEnterprise.disabled = false;
      modeHelp.textContent = 'Seleciona como queres entrar.';
      modeModal.style.display = 'flex';
    }

    function closeModeSelection() {
      modeModal.style.display = 'none';
      pendingUser = null;
    }

    const params = new URLSearchParams(window.location.search);
    const reason = params.get('reason');
    if (reason === 'auth_required') {
      showError('Faça login para aceder às aplicações.');
    } else if (reason === 'enterprise_required') {
      showError('A conta atual não tem acesso empresarial.');
    }

    const activeSession = readSession();
    if (activeSession?.id && activeSession?.email) {
      localStorage.removeItem(SESSION_KEY);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;

      if (!email || !password) {
        showError('Preencha email e senha.');
        return;
      }

      submitBtn.disabled = true;

      try {
        const user = await loginUser(email, password);

        if (!user) {
          showError('Email ou senha inválidos.');
          submitBtn.disabled = false;
          return;
        }

        localStorage.setItem(SESSION_KEY, JSON.stringify({
          id: user.id,
          name: user.name,
          email: user.email,
          role: user.role ?? 'user',
          plan: user.plan ?? 'free',
          organizationId: user.organizationId ?? null,
        }));

        openModeSelection(user);
      } catch {
        showError('Erro ao tentar login. Tente novamente.');
        submitBtn.disabled = false;
      }
    });

    btnModePersonal.addEventListener('click', () => {
      if (!pendingUser) return;
      redirectBySession(pendingUser, 'personal');
    });

    btnModeEnterprise.addEventListener('click', () => {
      if (!pendingUser) return;
      redirectBySession(pendingUser, 'enterprise');
    });

    btnModeCancel.addEventListener('click', () => {
      localStorage.removeItem(SESSION_KEY);
      closeModeSelection();
      submitBtn.disabled = false;
      showError('Login cancelado. Escolhe o modo para continuar.');
    });
  </script>
</body>
</html>
