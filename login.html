<!DOCTYPE html>
<html lang="pt" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0d1117" />
  <title>Entrar — Dev Tasks</title>

  <!-- Redirect if already authenticated -->
  <script>
    (function() {
      if (location.search.includes('logout')) {
        localStorage.removeItem('devtasks_user');
        history.replaceState(null, '', 'login.html');
        return;
      }
      var s = null;
      try { s = JSON.parse(localStorage.getItem('devtasks_user')); } catch(e) {}
      if (s) window.location.replace(s.organizationId ? 'app-enterprise.html' : 'app.html');
    })();
  </script>

  <link rel="icon" href="favicon.ico" type="image/x-icon" />

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    crossorigin="anonymous"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />
  <link rel="stylesheet" href="src/css/landing.css" />

  <meta name="google-signin-client_id" content="661228220614-f78g5rlstqikchqfj37acdatb3495j0g.apps.googleusercontent.com" />
</head>
<body class="auth-page">

  <main aria-label="Autentificação">
  <div class="auth-wrapper">
    <div class="auth-card">

      <!-- Back link -->
      <a href="./index.html" class="auth-back" aria-label="Voltar à página inicial">
        <i class="bi bi-arrow-left" aria-hidden="true"></i>
      </a>

      <!-- Mode toggle -->
      <div class="login-mode-toggle mb-4">
        <button type="button" class="login-mode-btn login-mode-btn--active" id="btn-mode-solo" aria-pressed="true">
          <i class="bi bi-person-fill me-1"></i>Pessoal
        </button>
        <button type="button" class="login-mode-btn" id="btn-mode-enterprise" aria-pressed="false">
          <i class="bi bi-building-fill me-1"></i>Empresarial
        </button>
      </div>

      <!-- Header -->
      <div class="text-center mb-4">
        <a href="./index.html" class="landing-brand mb-3 d-inline-flex">
          <i class="bi bi-kanban-fill" aria-hidden="true"></i>
          <span>Dev Tasks</span>
        </a>
        <h1 class="auth-title" id="login-title">Bem-vindo de volta</h1>
        <p class="text-muted small" id="login-subtitle">Introduza os seus dados para entrar.</p>
      </div>

      <!-- Alert -->
      <div id="auth-error" class="alert alert-danger small py-2 d-none" role="alert"></div>

      <!-- Form -->
      <form id="login-form" novalidate>
        <input type="hidden" id="login-mode" value="solo" />

        <div class="mb-3">
          <label for="login-email" class="form-label">Email</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope-fill" aria-hidden="true"></i></span>
            <input
              type="email"
              class="form-control"
              id="login-email"
              placeholder="nome@exemplo.com"
              required
              autocomplete="email"
            />
          </div>
        </div>

        <div class="mb-3">
          <label for="login-password" class="form-label">Palavra-passe</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill" aria-hidden="true"></i></span>
            <input
              type="password"
              class="form-control"
              id="login-password"
              placeholder="••••••••"
              required
              minlength="6"
              autocomplete="current-password"
            />
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 mt-2" id="btn-login">
          <i class="bi bi-box-arrow-in-right me-2" aria-hidden="true"></i>Entrar
        </button>

      </form>

      <!-- Divider -->
      <div class="auth-divider my-3">
        <span>ou</span>
      </div>

      <!-- Google Sign-In -->
      <button type="button" class="btn-google w-100" id="btn-google-login">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" height="20" alt="" aria-hidden="true" />
        Continuar com Google
      </button>

      <div class="text-center mt-4">
        <p class="text-muted small mb-0" id="login-footer-solo">
          Não tem conta?
          <a href="register.html" class="auth-link">Criar conta</a>
        </p>
        <p class="text-muted small mb-0 d-none" id="login-footer-enterprise">
          Sem conta empresarial?
          <a href="register-empresa.html" class="auth-link">Registar organização</a>
        </p>
      </div>

    </div>
  </div>
  </main>

  <script src="src/js/auth.js" type="module"></script>
</body>
</html>
