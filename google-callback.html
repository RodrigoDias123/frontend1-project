<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A autenticar...</title>
  <style>
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    p { font-size: 1rem; opacity: 0.7; }
  </style>
</head>
<body>
  <p>A autenticar com Google...</p>
  <script>
    (function () {
      var hash   = location.hash.slice(1);
      var params = new URLSearchParams(hash);
      var token  = params.get('access_token');
      var error  = params.get('error');

      function send(data) {
        if (window.opener && !window.opener.closed) {
          window.opener.postMessage(data, location.origin);
        }
        setTimeout(function () { window.close(); }, 300);
      }

      if (error || !token) {
        send({ type: 'google-auth-error', error: error || 'no_token' });
        return;
      }

      fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
        headers: { 'Authorization': 'Bearer ' + token }
      })
        .then(function (r) { return r.json(); })
        .then(function (user) {
          send({ type: 'google-auth-success', user: user });
        })
        .catch(function () {
          send({ type: 'google-auth-error', error: 'userinfo_failed' });
        });
    })();
  </script>
</body>
</html>
